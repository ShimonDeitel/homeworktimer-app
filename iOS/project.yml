name: HomeworkTimer
options:
  bundleIdPrefix: com.shimondeitel.homeworktimer
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  HomeworkTimer:
    type: application
    platform: iOS
    sources:
      - path: HomeworkTimer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.homeworktimer
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: HomeworkTimer/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  HomeworkTimerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: HomeworkTimerTests
      - path: HomeworkTimer.storekit
    dependencies:
      - target: HomeworkTimer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.homeworktimer.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  HomeworkTimerUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: HomeworkTimerUITests
    dependencies:
      - target: HomeworkTimer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.homeworktimer.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  HomeworkTimer:
    build:
      targets:
        HomeworkTimer: all
        HomeworkTimerTests: [test]
        HomeworkTimerUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: HomeworkTimer.storekit
    test:
      config: Debug
      storeKitConfiguration: HomeworkTimer.storekit
      targets:
        - HomeworkTimerTests
        - HomeworkTimerUITests
    archive:
      config: Release
